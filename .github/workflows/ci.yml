name: build-and-test

on:
  push:
    branches: [ main, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: SwiftLint
        run: |
          if [ -f DocuScan/DocuScan.xcodeproj/project.pbxproj ]; then
            swiftlint --strict --config .swiftlint.yml
          fi

      - name: Build & Test
        run: |
          if [ -f DocuScan/DocuScan.xcodeproj/project.pbxproj ]; then
            xcodebuild test \
              -project DocuScan/DocuScan.xcodeproj \
              -scheme DocuScan \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.0' \
              -resultBundlePath ./TestResults.xcresult \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "Xcode project not yet created — skipping build"
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
